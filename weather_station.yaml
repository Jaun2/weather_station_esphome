substitutions:
  device_name: weather-station
  friendly_name: "Weather Station"
  mm_per_tip: '0.6314'              # SS4H-RG reference; recalibrate at Stage 7
  session_gap_minutes: '60'         # idle minutes before a rain session ends
  raining_window_minutes: '5'       # tips within this many minutes => "Is Raining" = true
  min_battery_voltage: '3.0'        # LiPo cutoff (0 %)
  max_battery_voltage: '4.2'        # LiPo full (100 %)
  low_voltage_cutoff: '3.3'         # below this, force long sleep
  cutoff_sleep_hours: '24'          # how long to sleep when battery is low
  battery_divider_ratio: '2.0'      # DFR1075 IO1 onboard divider (verified, DFRobot wiki)
  solar_divider_ratio: '4.9'        # External divider on GPIO1: 39 kΩ (high) + 10 kΩ (low) -> (R1+R2)/R2 = 4.9
  min_charging_voltage: '4.5'       # Solar Voltage at/above this means the panel is producing usable voltage

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    # Boot-safety: prevent sleep until the HA helper toggle has been
    # received and the on_state handler decides allow vs. prevent.
    # Without this, a slow first-boot WiFi/API connect can let the
    # 25 s run_duration timer fire before we know the toggle state,
    # and the device sleeps anyway. Toggle ON → on_state will call
    # deep_sleep.allow; toggle OFF → on_state already calls prevent
    # so this stays effectively in force.
    - priority: 600
      then:
        - deep_sleep.prevent: deep_sleep_ctl

    # Wake-cause check for reed-switch tips during deep sleep.
    - priority: -10
      then:
        - lambda: |-
            // Stage 3: count a tip if the reed switch caused this wake.
            // The reed closure is over by the time the chip is up
            // (~1 s boot vs ~10-50 ms closure), so the binary_sensor's
            // on_press lambda will not fire from a sleep-wake event in
            // normal operation.
            esp_sleep_wakeup_cause_t cause = esp_sleep_get_wakeup_cause();
            if (cause == ESP_SLEEP_WAKEUP_GPIO ||
                cause == ESP_SLEEP_WAKEUP_EXT0 ||
                cause == ESP_SLEEP_WAKEUP_EXT1) {
              auto t = id(ha_time).now();
              if (t.is_valid()) {
                uint32_t now_ts = t.timestamp;
                uint32_t gap = id(rain_last_tip_epoch) > 0
                  ? (now_ts - id(rain_last_tip_epoch))
                  : 0;
                if (gap > ${session_gap_minutes} * 60) {
                  id(rain_session_tips) = 0;
                }
                id(rain_last_tip_epoch) = now_ts;
              }
              id(rain_session_tips) += 1;
              id(rain_tips_total) += 1;
            }

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# Mark a successfully-booted OTA as 'good' after 10 s instead of the
# default 60 s. Required because our deep_sleep run_duration is 25 s —
# without this, every wake would sleep before the OTA was validated,
# the bootloader would roll back to the previous firmware on the next
# wake, and our latest changes would never actually run on the device.
safe_mode:
  boot_is_good_after: 10s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  ap:
    ssid: "Weather Station Hotspot"
    password: !secret ap_password

captive_portal:

deep_sleep:
  id: deep_sleep_ctl
  run_duration: 25s              # 15 s was tight on first wake after a fresh
                                 # flash — BME280 → dew_point → derived chain
                                 # could see NaN within a single 10 s tick.
                                 # 25 s gives two 10 s ticks comfortably.
  sleep_duration: 5min
  wakeup_pin:
    number: GPIO4
    inverted: true              # wake on falling edge (reed-to-GND closure)
    allow_other_uses: true      # also used by the Rain Bucket binary_sensor
    mode:
      input: true
      pullup: true

globals:
  # Cumulative tip count since install. Persists across reboots and
  # (later) deep sleep cycles via NVS.
  - id: rain_tips_total
    type: int
    restore_value: yes
    initial_value: '0'

  # Tip count in the current/most-recent rain session. Resets when a new
  # session begins (gap > session_gap_minutes since last tip).
  - id: rain_session_tips
    type: int
    restore_value: yes
    initial_value: '0'

  # Unix epoch seconds of the last tip. Used to detect new rain sessions.
  - id: rain_last_tip_epoch
    type: uint32_t
    restore_value: yes
    initial_value: '0'

time:
  - platform: homeassistant
    id: ha_time

i2c:
  sda: GPIO19
  scl: GPIO20
  scan: true
  id: bus_a

web_server:
  port: 80

status_led:
  pin:
    number: GPIO15
    inverted: false

binary_sensor:
  # Tipping-bucket reed switch. Closes briefly each time the bucket tips,
  # pulling GPIO4 to GND through the internal pullup.
  - platform: gpio
    pin:
      number: GPIO4
      allow_other_uses: true        # also used by deep_sleep wakeup_pin
      mode:
        input: true
        pullup: true
      inverted: true                # reed-to-GND closure → 'on'
    name: "Rain Bucket"
    filters:
      - delayed_off: 100ms          # fire leading edge immediately;
                                    # debounce by holding 'on' for 100ms
                                    # after release. Reed swipes are too
                                    # brief (10-50 ms) for delayed_on to
                                    # ever fire on_press.
    on_press:
      then:
        - lambda: |-
            auto t = id(ha_time).now();
            if (t.is_valid()) {
              uint32_t now_ts = t.timestamp;
              uint32_t gap = id(rain_last_tip_epoch) > 0
                ? (now_ts - id(rain_last_tip_epoch))
                : 0;
              if (gap > ${session_gap_minutes} * 60) {
                id(rain_session_tips) = 0;
              }
              id(rain_last_tip_epoch) = now_ts;
            }
            id(rain_session_tips) += 1;
            id(rain_tips_total) += 1;

  # True when at least one tip has occurred in the last
  # ${raining_window_minutes} minutes. Re-evaluated every device
  # update tick during the 25 s awake window; with the 5-min sleep
  # cycle the published value can be at most one cycle stale.
  - platform: template
    name: "Is Raining"
    icon: mdi:weather-pouring
    lambda: |-
      auto t = id(ha_time).now();
      if (!t.is_valid()) return {};                              // unknown until time syncs
      if (id(rain_last_tip_epoch) == 0) return false;
      return (t.timestamp - id(rain_last_tip_epoch))
             < ${raining_window_minutes} * 60;

  # Solar charging detector. Reads the post-divider VIN voltage and flips
  # 'on' when it exceeds the minimum required to actually charge the LiPo
  # via the FireBeetle's MPPT. Below ${min_charging_voltage} V the MPPT
  # can't sustain charge regardless of battery state, so call that "not
  # charging" even if the panel is putting out some sub-threshold voltage.
  # Stage 5.5.
  - platform: template
    name: "Charging"
    id: charging
    device_class: battery_charging
    icon: mdi:solar-power-variant
    entity_category: diagnostic
    lambda: |-
      float vin = id(solar_voltage).state;
      if (isnan(vin)) return {};                                 // unknown until first sample
      return vin >= ${min_charging_voltage};

  - platform: homeassistant
    id: deep_sleep_enable
    entity_id: input_boolean.weather_station_deep_sleep
    trigger_on_initial_state: true
    on_state:
      then:
        - if:
            condition:
              lambda: 'return x;'
            then:
              - deep_sleep.allow: deep_sleep_ctl
            else:
              - deep_sleep.prevent: deep_sleep_ctl

button:
  - platform: restart
    name: "Restart"

  - platform: template
    name: "Rain Tips Reset"
    on_press:
      then:
        - lambda: |-
            id(rain_tips_total) = 0;
            id(rain_session_tips) = 0;
            id(rain_last_tip_epoch) = 0;

sensor:
  - platform: wifi_signal
    name: "Wi-Fi Signal"
    id: wifi_signal_dbm
    update_interval: 10s            # 60s never fires inside the 25 s wake;
                                    # match other diagnostic sensors so we
                                    # get a fresh sample on every cycle.

  - platform: template
    name: "Wi-Fi Signal Strength"
    icon: mdi:wifi
    unit_of_measurement: "%"
    accuracy_decimals: 0
    entity_category: diagnostic
    update_interval: 10s            # match wifi_signal_dbm — was 60s, which
                                    # never fired during a deep-sleep wake.
    lambda: |-
      float dbm = id(wifi_signal_dbm).state;
      if (isnan(dbm)) return NAN;
      // Linear map: -50 dBm -> 100 %, -100 dBm -> 0 %, clamped.
      float pct = 2.0f * (dbm + 100.0f);
      return std::max(0.0f, std::min(100.0f, pct));

  - platform: uptime
    name: "Uptime"

  # setup_priority: -200 pushes BME280 setup past WiFi/API stabilisation,
  # so the first I²C reads happen in a quiet RF environment. Without it,
  # WiFi association activity coupled onto GPIO19/20 corrupts the initial
  # transactions, the sensor returns NaN, and that NaN propagates through
  # every derived sensor (Heat Index, Dew Point, Feels Like, etc.) — they
  # all read 'Unknown' in HA. Same SS4H-RG pattern documented in CLAUDE.md
  # and already applied to the battery and solar ADCs.
  - platform: bme280_i2c
    address: 0x76
    setup_priority: -200
    update_interval: 10s
    temperature:
      name: "Temperature"
      id: bme_temperature
    pressure:
      name: "Pressure"
      id: bme_pressure
    humidity:
      name: "Humidity"
      id: bme_humidity

  # Trend gradients computed by HA's `statistics` integration (defined in the
  # HA package). Subscribed back into the firmware so the rain likelihood
  # lambda can use real change-rate values, not just rising/falling flags.
  # `internal: true` keeps these out of HA — they're already in HA, no point
  # in republishing them.
  - platform: homeassistant
    id: ha_pressure_trend
    entity_id: sensor.weather_station_pressure_change_rate_3h
    internal: true

  - platform: homeassistant
    id: ha_humidity_trend
    entity_id: sensor.weather_station_humidity_change_rate_2h
    internal: true

  - platform: homeassistant
    id: ha_rainfall_rate
    entity_id: sensor.weather_station_rainfall_rate
    internal: true

  # Rolling 24-hour rainfall total, computed by HA's `statistics` integration
  # in the package. Internal here; the device-card-friendly `Rainfall 24h`
  # template sensor below republishes it under a clean name.
  - platform: homeassistant
    id: ha_rainfall_24h
    entity_id: sensor.weather_station_rainfall_24h_source
    internal: true

  # Battery voltage on GPIO0. Confirmed against the DFRobot DFR1075 wiki
  # Arduino sample which uses analogRead(0) / analogReadMilliVolts(0) —
  # pin 0 == GPIO0 on the ESP32-C6. CLAUDE.md previously said GPIO0 was
  # the 3V3_C control pin; that note was wrong, and we don't currently
  # have anything wired to 3V3_C anyway. Sample post-WiFi (SS4H-RG
  # pattern) to minimize radio-coupled ADC noise.
  - platform: adc
    pin: GPIO0
    name: "Battery Voltage"
    id: battery_voltage
    unit_of_measurement: "V"
    accuracy_decimals: 2
    device_class: voltage
    state_class: measurement
    entity_category: diagnostic
    setup_priority: -200
    update_interval: 2s         # ~10-12 software samples per 25 s wake.
                                # Cadence chosen so the median filter below
                                # publishes ONE settled value per wake from
                                # a full window of 10.
    attenuation: 12db
    samples: 64                 # hardware oversampling: average 64 ADC
                                # conversions per software sample. ESP32-C6
                                # ADCs have ~±20 mV single-sample noise;
                                # 64 samples drops it to ~±2.5 mV (~√64
                                # improvement). Cost: ~0.6 ms per sample.
                                # Doesn't help with WiFi-TX-coincidence
                                # battery sag (~30-50 mV across a TX burst,
                                # which is longer than the 0.6 ms hw
                                # window) — that's what the software median
                                # below is for.
    filters:
      - multiply: ${battery_divider_ratio}
      - skip_initial: 1         # drop the first sample after wake; ADC /
                                # WiFi-connect transient.
      - median:                 # one publish per wake, taken as the median
          window_size: 10       # of 10 samples spread across ~20 s. The
          send_every: 10        # WiFi-TX-coincidence sag dips (a minority
          send_first_at: 10     # of the 10 samples) get ignored by the
                                # median; HA records one settled point per
                                # 5-minute wake instead of a flapping 5.
    on_value:
      then:
        - if:
            condition:
              # NaN < 3.3 evaluates to false in C++, so a transient NaN
              # reading at boot won't trigger the cutoff. Only a real
              # voltage below the threshold fires deep_sleep.enter.
              lambda: 'return x < ${low_voltage_cutoff};'
            then:
              - deep_sleep.enter:
                  id: deep_sleep_ctl
                  sleep_duration: ${cutoff_sleep_hours}h

  # Battery percentage from the LiPo discharge curve. Piecewise linear
  # approximation with anchors at 4.2 V → 100 %, 3.7 V → 50 %, 3.4 V → 10 %,
  # 3.0 V → 0 %. More accurate near the bottom of the curve than a single
  # linear interpolation across [3.0, 4.2].
  - platform: template
    name: "Battery"
    id: battery_percent
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: battery
    state_class: measurement
    entity_category: diagnostic
    update_interval: 30s            # battery_voltage publishes once per
                                    # wake (~5 min), so anything faster
                                    # than that just re-reads the same
                                    # value. 30 s keeps the percentage
                                    # within one tick of the voltage during
                                    # the awake window, then idles between
                                    # wakes.
    lambda: |-
      float v = id(battery_voltage).state;
      if (isnan(v)) return NAN;
      // Piecewise LiPo curve.
      if (v >= 4.2f) return 100.0f;
      if (v >= 3.7f) return 50.0f + (v - 3.7f) * 100.0f;     // [3.7, 4.2] → [50, 100]
      if (v >= 3.4f) return 10.0f + (v - 3.4f) * 133.33f;    // [3.4, 3.7] → [10, 50]
      if (v >= 3.0f) return (v - 3.0f) * 25.0f;              // [3.0, 3.4] → [0, 10]
      return 0.0f;

  # Solar (VIN) voltage via the external 5:1 divider on GPIO1.
  # 39 kΩ (high side) between VIN and GPIO1, 10 kΩ (low side) between GPIO1
  # and GND, optional 100 nF cap GPIO1 -> GND. Lambda multiplier 4.9 maps
  # the divided value back to the actual VIN voltage. Stage 5.5.
  - platform: adc
    pin: GPIO1
    name: "Solar Voltage"
    id: solar_voltage
    unit_of_measurement: "V"
    accuracy_decimals: 2
    device_class: voltage
    state_class: measurement
    entity_category: diagnostic
    setup_priority: -200
    update_interval: 2s          # ~10-12 samples per 25 s wake; same
                                 # reasoning as battery_voltage above.
    attenuation: 12db
    samples: 64                  # hardware oversampling — same reasoning as
                                 # the battery ADC. Reduces single-sample
                                 # noise from ~±20 mV to ~±2.5 mV.
    filters:
      - multiply: ${solar_divider_ratio}
      - skip_initial: 1
      - median:                  # one publish per wake, median of 10.
          window_size: 10        # Solar voltage CAN change quickly (cloud
          send_every: 10         # crossing the panel) but deep sleep already
          send_first_at: 10      # quantises everything to 5-minute
                                 # granularity, so within-wake responsiveness
                                 # buys us nothing — the next reading is
                                 # 5 minutes away regardless. Median rejects
                                 # the same WiFi-TX-coincidence dips that
                                 # bother the battery line.

  # Derived metrics — computed in firmware so they appear on the device card
  # alongside Temperature/Humidity/Pressure. Lambdas reference the BME280's
  # IDs above; declaration order matters for sensors that depend on dew_point
  # (fog probability, rain likelihood, visibility text sensor).

  - platform: template
    name: "Dew Point"
    id: dew_point
    icon: mdi:water-thermometer-outline
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      float t = id(bme_temperature).state;
      float rh = id(bme_humidity).state;
      if (isnan(t) || isnan(rh) || rh <= 0.0f) return NAN;
      const float a = 17.625f;
      const float b = 243.04f;
      float alpha = (a * t) / (b + t) + log(rh / 100.0f);
      return (b * alpha) / (a - alpha);

  - platform: template
    name: "Heat Index"
    id: heat_index
    icon: mdi:weather-sunny-alert
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      float t = id(bme_temperature).state;
      float rh = id(bme_humidity).state;
      if (isnan(t) || isnan(rh)) return NAN;
      // Rothfusz regression is only valid when T >= 27 C and RH >= 40 %.
      // Below that, heat index is undefined — return NAN so HA shows the
      // entity as Unknown rather than echoing T (which would be misleading).
      if (t < 27.0f || rh < 40.0f) return NAN;
      float tf = t * 9.0f / 5.0f + 32.0f;
      float hi_f = -42.379f
                   + 2.04901523f * tf
                   + 10.14333127f * rh
                   - 0.22475541f * tf * rh
                   - 0.00683783f * tf * tf
                   - 0.05481717f * rh * rh
                   + 0.00122874f * tf * tf * rh
                   + 0.00085282f * tf * rh * rh
                   - 0.00000199f * tf * tf * rh * rh;
      return (hi_f - 32.0f) * 5.0f / 9.0f;

  - platform: template
    name: "Frost Point"
    id: frost_point
    icon: mdi:snowflake-thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      float t = id(bme_temperature).state;
      float rh = id(bme_humidity).state;
      // Only meaningful below 0 C (saturation over ice). Otherwise leave
      // the entity unknown so dashboards can hide it.
      if (isnan(t) || isnan(rh) || rh <= 0.0f || t >= 0.0f) return NAN;
      const float a = 22.587f;
      const float b = 273.86f;
      float alpha = (a * t) / (b + t) + log(rh / 100.0f);
      return (b * alpha) / (a - alpha);

  - platform: template
    name: "Fog Probability"
    icon: mdi:weather-fog
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      float t = id(bme_temperature).state;
      float rh = id(bme_humidity).state;
      float td = id(dew_point).state;
      if (isnan(t) || isnan(rh) || isnan(td)) return NAN;
      float spread = std::max(0.0f, t - td);
      float rh_frac = rh / 100.0f;
      float score = (rh_frac * rh_frac) * std::max(0.0f, 100.0f - 25.0f * spread);
      return std::min(100.0f, std::max(0.0f, score));

  - platform: template
    name: "Rain Likelihood"
    icon: mdi:cloud-percent-outline
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      float t = id(bme_temperature).state;
      float td = id(dew_point).state;
      float p_trend = id(ha_pressure_trend).state;  // hPa/sec
      float h_trend = id(ha_humidity_trend).state;  // %/sec
      if (isnan(t) || isnan(td)) return NAN;
      float spread = std::max(0.0f, t - td);
      float spread_score = std::max(0.0f,
        std::min(33.0f, 33.0f * (1.0f - spread / 5.0f)));
      // Map pressure fall rate onto 0..33: -0.0001 hPa/s (fast fall) -> 33,
      // 0 (steady or rising) -> 0. NaN means HA hasn't pushed yet -> 0.
      float p_score = isnan(p_trend) ? 0.0f
        : std::max(0.0f, std::min(33.0f, -p_trend * 330000.0f));
      // Map humidity rise rate onto 0..34: +0.0002 %/s (fast rise) -> 34,
      // 0 (steady or falling) -> 0. NaN -> 0.
      float h_score = isnan(h_trend) ? 0.0f
        : std::max(0.0f, std::min(34.0f, h_trend * 170000.0f));
      return p_score + h_score + spread_score;

  - platform: template
    name: "Feels Like"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      float t = id(bme_temperature).state;
      float rh = id(bme_humidity).state;
      if (isnan(t) || isnan(rh)) return NAN;
      // Australian Apparent Temperature (Steadman / BOM), no-wind variant.
      // Stage 9 will subtract 0.70*v once wind is available.
      float es = 6.105f * exp(17.27f * t / (237.7f + t));
      float e = (rh / 100.0f) * es;
      return t + 0.33f * e - 4.00f;

  - platform: template
    name: "Rain Tips"
    id: rain_tips_count
    accuracy_decimals: 0
    state_class: total_increasing
    update_interval: 10s
    lambda: |-
      return id(rain_tips_total);

  - platform: template
    name: "Rainfall"
    icon: mdi:weather-pouring
    unit_of_measurement: "mm"
    accuracy_decimals: 2
    state_class: total_increasing
    update_interval: 10s
    lambda: |-
      return id(rain_tips_total) * ${mm_per_tip};

  - platform: template
    name: "Rainfall Session"
    icon: mdi:weather-pouring
    unit_of_measurement: "mm"
    accuracy_decimals: 2
    state_class: measurement
    update_interval: 10s
    lambda: |-
      return id(rain_session_tips) * ${mm_per_tip};

  # Rolling 24-hour rainfall total. Wraps the HA `statistics` value so the
  # device-card name is clean (otherwise the entity would inherit the source
  # sensor's "Rainfall 24h Source" name). NaN passthrough on first wakes
  # before HA has pushed a value.
  - platform: template
    name: "Rainfall 24h"
    icon: mdi:weather-pouring
    unit_of_measurement: "mm"
    accuracy_decimals: 2
    state_class: measurement
    update_interval: 10s
    lambda: |-
      float v = id(ha_rainfall_24h).state;
      if (isnan(v)) return NAN;
      return v;

text_sensor:
  - platform: template
    name: "Visibility"
    update_interval: 10s
    lambda: |-
      float t = id(bme_temperature).state;
      float rh = id(bme_humidity).state;
      float td = id(dew_point).state;
      if (isnan(t) || isnan(rh) || isnan(td)) return std::string("unknown");
      float spread = std::max(0.0f, t - td);
      if (rh > 95.0f && spread < 1.0f) return std::string("Fog");
      if (rh > 90.0f) return std::string("Mist");
      if (rh > 80.0f) return std::string("Haze");
      return std::string("Clear");

  - platform: template
    name: "Heat Index Category"
    icon: mdi:weather-sunny-alert
    update_interval: 10s
    lambda: |-
      float hi = id(heat_index).state;
      // NaN means heat index isn't applicable (T < 27 C OR RH < 40 %).
      if (isnan(hi)) return std::string("Not Applicable");
      // NWS-standard breakpoints (originally 80/90/103/125 °F).
      if (hi < 32.2f) return std::string("Caution");
      if (hi < 39.4f) return std::string("Extreme Caution");
      if (hi < 51.7f) return std::string("Danger");
      return std::string("Extreme Danger");

  - platform: template
    name: "Frost Point Category"
    icon: mdi:snowflake-alert
    update_interval: 10s
    lambda: |-
      float fp = id(frost_point).state;
      // NaN means frost point isn't applicable (T >= 0 C).
      if (isnan(fp)) return std::string("Not Applicable");
      // Horticulture/agriculture convention; not an NWS standard.
      if (fp >= -2.0f) return std::string("Light Frost");
      if (fp >= -5.0f) return std::string("Hard Frost");
      return std::string("Severe Frost");

  - platform: template
    name: "Rain Intensity"
    icon: mdi:cloud-alert-outline
    update_interval: 10s
    lambda: |-
      float rate = id(ha_rainfall_rate).state;
      if (isnan(rate) || rate < 0.1f) return std::string("No Rain");
      if (rate < 2.5f) return std::string("Drizzle");
      if (rate < 7.6f) return std::string("Moderate");
      if (rate < 50.0f) return std::string("Heavy");
      return std::string("Storm");
