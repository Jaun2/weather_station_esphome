substitutions:
  device_name: weather-station
  friendly_name: "Weather Station"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  ap:
    ssid: "Weather Station Hotspot"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80

status_led:
  pin:
    number: GPIO15
    inverted: false

button:
  - platform: restart
    name: "Restart"

sensor:
  - platform: wifi_signal
    name: "Wi-Fi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
