# Weather Station — Home Assistant package
#
# Slim package: derived metrics (dew point, heat index, frost point, fog
# probability, rain likelihood, visibility, feels like) all live in the
# ESPHome firmware now and appear on the device card.
#
# HA's only role is computing pressure & humidity trend gradients from its
# recorder history. The firmware subscribes to those values and uses them
# as inputs to the rain likelihood lambda.
#
# The two `derivative` sensors below are plumbing, not user-facing data.
# Legacy `sensor:` platforms don't accept `entity_registry_enabled_default`,
# so they show up in HA initially. To hide: Settings → Devices & Services →
# Entities → search for "change rate" → click each → toggle off "Enabled".
# This survives restarts but does NOT survive removing/re-adding the package.
#
# Why `derivative` and not `statistics`? The `statistics` integration's
# `change_rate` characteristic refuses to compute on a source whose
# `state_class` is missing or non-measurement, which can happen depending
# on how ESPHome publishes its BME280 outputs. `derivative` does the same
# linear-regression fit over a time window with no state_class requirement.
#
# ----------------------------------------------------------------------------
# Drop-in instructions
# ----------------------------------------------------------------------------
#
# 1. Place this file at:  /config/packages/weather_station.yaml
#
# 2. ONE-TIME setup if you don't already use packages — in configuration.yaml,
#    add (or extend) the homeassistant block:
#
#      homeassistant:
#        packages: !include_dir_named packages
#
# 3. Restart Home Assistant. From now on, any file you drop under
#    /config/packages/ is auto-loaded.
#
# ----------------------------------------------------------------------------
# What this gives the firmware
# ----------------------------------------------------------------------------
#
#   sensor.weather_station_pressure_change_rate_3h    hPa/sec, hidden
#   sensor.weather_station_humidity_change_rate_2h    %/sec, hidden
#
# Both are subscribed by the ESPHome `weather-station` device via:
#
#   sensor:
#     - platform: homeassistant
#       id: ha_pressure_trend
#       entity_id: sensor.weather_station_pressure_change_rate_3h
#       internal: true
#
# Used in the `Rain Likelihood` template sensor's lambda.

sensor:
  # Pressure trend over 3 hours, expressed as hPa per second.
  # Linear least-squares fit over the time window.
  - platform: derivative
    name: "Weather Station Pressure Change Rate 3h"
    unique_id: weather_station_pressure_change_rate_3h
    source: sensor.weather_station_pressure
    time_window: "03:00:00"
    unit_time: s
    round: 6

  # Humidity trend over 2 hours, expressed as % per second.
  - platform: derivative
    name: "Weather Station Humidity Change Rate 2h"
    unique_id: weather_station_humidity_change_rate_2h
    source: sensor.weather_station_humidity
    time_window: "02:00:00"
    unit_time: s
    round: 6

  # Rainfall rate over a 15-min window. Source for the firmware-side
  # Rain Intensity text sensor. Stage 2.
  - platform: derivative
    name: "Weather Station Rainfall Rate"
    unique_id: weather_station_rainfall_rate
    source: sensor.weather_station_rainfall
    time_window: "00:15:00"
    unit_time: h
    round: 2

  # Rolling 24-hour rainfall tip count. Counts each on-edge of the device's
  # reed-switch binary sensor over the last 24 hours. The mm conversion
  # happens in the `Rainfall 24h Source` template sensor below; the firmware
  # then subscribes to that and republishes it on the device card as
  # "Rainfall 24h".
  #
  # This replaces an earlier `statistics` + `state_characteristic: change`
  # approach that did `last - first` over a sliding window of the cumulative
  # `Rainfall` sensor. That approach went NEGATIVE whenever the firmware's
  # `rain_tips_total` global was reset within the 24h window (USB-C reflash,
  # NVS wipe, manual Rain Tips Reset button, etc.) because `change` is not
  # `total_increasing`-aware. Counting reed events is reset-safe: tip events
  # live in HA's history independent of the firmware's cumulative counter.
  - platform: history_stats
    name: "Weather Station Rainfall 24h Tips"
    unique_id: weather_station_rainfall_24h_tips
    entity_id: binary_sensor.weather_station_rain_bucket
    state: "on"
    type: count
    duration:
      hours: 24
    end: "{{ now() }}"

# Convert the tip count above to mm using the same per-tip calibration the
# firmware uses (substitutions.mm_per_tip in weather_station.yaml). When
# recalibrating at Stage 7, update BOTH places.
template:
  - sensor:
      - name: "Weather Station Rainfall 24h Source"
        unique_id: weather_station_rainfall_24h_source
        unit_of_measurement: "mm"
        device_class: precipitation
        state_class: measurement
        availability: >-
          {{ states('sensor.weather_station_rainfall_24h_tips')
             not in ['unknown', 'unavailable', 'none', None] }}
        state: >-
          {{ (states('sensor.weather_station_rainfall_24h_tips')
              | float(0) * 0.6314) | round(2) }}

# Daily-reset rainfall total. Source is the cumulative `Rainfall` sensor
# published by the device firmware (with state_class: total_increasing).
# Stage 2.
utility_meter:
  weather_station_rainfall_today:
    name: "Weather Station Rainfall Today"
    source: sensor.weather_station_rainfall
    cycle: daily
