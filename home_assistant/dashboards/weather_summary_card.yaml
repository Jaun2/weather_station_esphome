# Weather Station — Summary Widget for Lovelace
#
# Drop-in dashboard card built on Mushroom Cards (HACS).
#
# Design rules:
#   • The card is always informative; chips that depend on derived
#     values hide cleanly when their source isn't available.
#   • Chance of rain and Feels-like temperature always show — they
#     are core "what's the weather right now" indicators.
#   • The "It's raining" panel only appears when actually raining,
#     and prominently shows the rain intensity.
#
# How to use:
#   1. In Home Assistant, edit your dashboard.
#   2. Add Card → Manual.
#   3. Paste the entire YAML below (everything from `type: vertical-stack`
#      to the end of the file).
#   4. Save.
#
# Requires:
#   - The Weather Station ESPHome integration.
#   - HACS + Mushroom Cards installed.

type: vertical-stack
cards:
  # ─────────────────────────────────────────────────────────────────
  # Title
  # ─────────────────────────────────────────────────────────────────
  - type: custom:mushroom-title-card
    title: Weather Station
    subtitle: Vereeniging

  # ─────────────────────────────────────────────────────────────────
  # System status row — charging, battery, Wi-Fi
  # Conditional chips use the simpler entity/state_not form (no
  # `condition: state` prefix) — Mushroom's conditional chip parser
  # accepts only that shorthand.
  # ─────────────────────────────────────────────────────────────────
  - type: custom:mushroom-chips-card
    alignment: end
    chips:
      - type: conditional
        conditions:
          - entity: binary_sensor.weather_station_charging
            state_not: unknown
          - entity: binary_sensor.weather_station_charging
            state_not: unavailable
        chip:
          type: template
          icon: mdi:solar-power-variant
          icon_color: |-
            {% if is_state('binary_sensor.weather_station_charging', 'on') %}
            green
            {% else %}
            disabled
            {% endif %}
          content: |-
            {% if is_state('binary_sensor.weather_station_charging', 'on') %}
            Charging
            {% else %}
            Idle
            {% endif %}
          tap_action:
            action: more-info
            entity: binary_sensor.weather_station_charging

      - type: conditional
        conditions:
          - entity: sensor.weather_station_battery
            state_not: unknown
          - entity: sensor.weather_station_battery
            state_not: unavailable
        chip:
          type: template
          icon: |-
            {% set p = states('sensor.weather_station_battery') | float(0) %}
            {% if p > 90 %}mdi:battery
            {% elif p > 70 %}mdi:battery-80
            {% elif p > 50 %}mdi:battery-60
            {% elif p > 30 %}mdi:battery-40
            {% elif p > 10 %}mdi:battery-20
            {% else %}mdi:battery-alert
            {% endif %}
          icon_color: |-
            {% set p = states('sensor.weather_station_battery') | float(0) %}
            {% if p > 50 %}green
            {% elif p > 20 %}orange
            {% else %}red
            {% endif %}
          content: "{{ states('sensor.weather_station_battery') | int(0) }}%"
          tap_action:
            action: more-info
            entity: sensor.weather_station_battery

      - type: conditional
        conditions:
          - entity: sensor.weather_station_wi_fi_signal_strength
            state_not: unknown
          - entity: sensor.weather_station_wi_fi_signal_strength
            state_not: unavailable
        chip:
          type: template
          icon: |-
            {% set s = states('sensor.weather_station_wi_fi_signal_strength') | float(0) %}
            {% if s > 70 %}mdi:wifi-strength-4
            {% elif s > 50 %}mdi:wifi-strength-3
            {% elif s > 30 %}mdi:wifi-strength-2
            {% elif s > 0 %}mdi:wifi-strength-1
            {% else %}mdi:wifi-strength-outline
            {% endif %}
          icon_color: |-
            {% set s = states('sensor.weather_station_wi_fi_signal_strength') | float(0) %}
            {% if s > 50 %}green
            {% elif s > 25 %}orange
            {% else %}red
            {% endif %}
          content: "{{ states('sensor.weather_station_wi_fi_signal_strength') | int(0) }}%"
          tap_action:
            action: more-info
            entity: sensor.weather_station_wi_fi_signal_strength

  # ─────────────────────────────────────────────────────────────────
  # Big current temperature with Feels Like always visible.
  # Single-line secondary template avoids the leading-newline issue
  # that hid the line in the previous version.
  # ─────────────────────────────────────────────────────────────────
  - type: custom:mushroom-template-card
    primary: "{{ states('sensor.weather_station_temperature') | float(0) | round(1) }}°C"
    secondary: "Feels like {{ states('sensor.weather_station_feels_like_2') | float(0) | round(1) }}°C"
    icon: mdi:thermometer
    icon_color: |-
      {% set t = states('sensor.weather_station_temperature') | float(0) %}
      {% if t >= 30 %}red
      {% elif t >= 20 %}orange
      {% elif t >= 10 %}amber
      {% elif t >= 0 %}blue
      {% else %}indigo
      {% endif %}
    fill_container: true
    tap_action:
      action: more-info
      entity: sensor.weather_station_temperature

  # ─────────────────────────────────────────────────────────────────
  # Atmosphere chips — Visibility, Humidity, Pressure.
  # Conditional chips hide individually when their source is unknown.
  # ─────────────────────────────────────────────────────────────────
  - type: custom:mushroom-chips-card
    chips:
      - type: conditional
        conditions:
          - entity: sensor.weather_station_visibility_2
            state_not: unknown
          - entity: sensor.weather_station_visibility_2
            state_not: unavailable
        chip:
          type: template
          entity: sensor.weather_station_visibility_2
          icon: |-
            {% set v = states('sensor.weather_station_visibility_2') %}
            {% if v == 'Fog' %}mdi:weather-fog
            {% elif v == 'Mist' %}mdi:weather-fog
            {% elif v == 'Haze' %}mdi:weather-hazy
            {% else %}mdi:weather-sunny
            {% endif %}
          icon_color: |-
            {% set v = states('sensor.weather_station_visibility_2') %}
            {% if v in ['Fog', 'Mist'] %}grey
            {% elif v == 'Haze' %}orange
            {% else %}amber
            {% endif %}
          content: "{{ states('sensor.weather_station_visibility_2') }}"
          tap_action:
            action: more-info
            entity: sensor.weather_station_visibility_2

      - type: conditional
        conditions:
          - entity: sensor.weather_station_humidity
            state_not: unknown
          - entity: sensor.weather_station_humidity
            state_not: unavailable
        chip:
          type: template
          entity: sensor.weather_station_humidity
          icon: mdi:water-percent
          icon_color: blue
          content: "{{ states('sensor.weather_station_humidity') | float(0) | round(0) }}%"
          tap_action:
            action: more-info
            entity: sensor.weather_station_humidity

      - type: conditional
        conditions:
          - entity: sensor.weather_station_pressure
            state_not: unknown
          - entity: sensor.weather_station_pressure
            state_not: unavailable
        chip:
          type: template
          entity: sensor.weather_station_pressure
          icon: mdi:gauge
          icon_color: indigo
          content: "{{ states('sensor.weather_station_pressure') | float(0) | round(0) }} hPa"
          tap_action:
            action: more-info
            entity: sensor.weather_station_pressure

  # ─────────────────────────────────────────────────────────────────
  # "It's raining" — only renders when actively raining. Primary
  # confirms the rain status, secondary shows the intensity
  # (Drizzle / Moderate / Heavy / Storm) right below.
  # ─────────────────────────────────────────────────────────────────
  - type: conditional
    conditions:
      - entity: binary_sensor.weather_station_is_raining
        state: 'on'
    card:
      type: custom:mushroom-template-card
      primary: It's raining right now
      secondary: "{{ states('sensor.weather_station_rain_intensity') }}"
      icon: mdi:weather-pouring
      icon_color: blue
      fill_container: true
      tap_action:
        action: more-info
        entity: sensor.weather_station_rain_intensity

  # ─────────────────────────────────────────────────────────────────
  # Rainfall summary — today + last 24 h
  # ─────────────────────────────────────────────────────────────────
  - type: conditional
    conditions:
      - entity: sensor.weather_station_rainfall_today
        state_not: unknown
      - entity: sensor.weather_station_rainfall_today
        state_not: unavailable
    card:
      type: custom:mushroom-template-card
      primary: Rainfall
      secondary: "Today: {{ states('sensor.weather_station_rainfall_today') | float(0) | round(2) }} mm  ·  24h: {{ states('sensor.weather_station_rainfall_24h') | float(0) | round(2) }} mm"
      icon: mdi:water
      icon_color: |-
        {% set today = states('sensor.weather_station_rainfall_today') | float(0) %}
        {% if today > 5 %}blue
        {% elif today > 0 %}cyan
        {% else %}disabled
        {% endif %}
      tap_action:
        action: more-info
        entity: sensor.weather_station_rainfall_today

  # ─────────────────────────────────────────────────────────────────
  # Forecast hint chips.
  #   • Chance of rain — always visible, even at 0% (per user request).
  #   • Fog probability — hides when source is unknown.
  # ─────────────────────────────────────────────────────────────────
  - type: custom:mushroom-chips-card
    chips:
      # Chance of rain — always visible, no conditional wrapper.
      - type: template
        entity: sensor.weather_station_rain_likelihood_2
        icon: mdi:cloud-percent-outline
        icon_color: |-
          {% set p = states('sensor.weather_station_rain_likelihood_2') | float(0) %}
          {% if p >= 70 %}blue
          {% elif p >= 40 %}cyan
          {% else %}grey
          {% endif %}
        content: "Rain probability {{ states('sensor.weather_station_rain_likelihood_2') | float(0) | round(0) | int }}%"
        tap_action:
          action: more-info
          entity: sensor.weather_station_rain_likelihood_2

      - type: conditional
        conditions:
          - entity: sensor.weather_station_fog_probability_2
            state_not: unknown
          - entity: sensor.weather_station_fog_probability_2
            state_not: unavailable
        chip:
          type: template
          entity: sensor.weather_station_fog_probability_2
          icon: mdi:weather-fog
          icon_color: |-
            {% set p = states('sensor.weather_station_fog_probability_2') | float(0) %}
            {% if p >= 70 %}grey
            {% elif p >= 40 %}blue-grey
            {% else %}disabled
            {% endif %}
          content: "Fog risk {{ states('sensor.weather_station_fog_probability_2') | float(0) | round(0) | int }}%"
          tap_action:
            action: more-info
            entity: sensor.weather_station_fog_probability_2

  # ─────────────────────────────────────────────────────────────────
  # Heat warning — built-in HA conditional card. Multiple state_not
  # conditions are AND-ed, so the card only renders when the category
  # is none of the excluded values.
  # ─────────────────────────────────────────────────────────────────
  - type: conditional
    conditions:
      - entity: sensor.weather_station_heat_index_category
        state_not: Not Applicable
      - entity: sensor.weather_station_heat_index_category
        state_not: unknown
      - entity: sensor.weather_station_heat_index_category
        state_not: unavailable
    card:
      type: custom:mushroom-template-card
      primary: "Heat: {{ states('sensor.weather_station_heat_index_category') }}"
      secondary: "Heat index {{ states('sensor.weather_station_heat_index_2') | float(0) | round(1) }}°C"
      icon: mdi:weather-sunny-alert
      icon_color: |-
        {% set c = states('sensor.weather_station_heat_index_category') %}
        {% if c == 'Caution' %}yellow
        {% elif c == 'Extreme Caution' %}orange
        {% elif c == 'Danger' %}red
        {% else %}deep-purple
        {% endif %}
      fill_container: true
      tap_action:
        action: more-info
        entity: sensor.weather_station_heat_index_2

  # ─────────────────────────────────────────────────────────────────
  # Frost warning — same pattern as the heat warning.
  # ─────────────────────────────────────────────────────────────────
  - type: conditional
    conditions:
      - entity: sensor.weather_station_frost_point_category
        state_not: Not Applicable
      - entity: sensor.weather_station_frost_point_category
        state_not: unknown
      - entity: sensor.weather_station_frost_point_category
        state_not: unavailable
    card:
      type: custom:mushroom-template-card
      primary: "Frost: {{ states('sensor.weather_station_frost_point_category') }}"
      secondary: "Frost point {{ states('sensor.weather_station_frost_point_2') | float(0) | round(1) }}°C"
      icon: mdi:snowflake-alert
      icon_color: |-
        {% set c = states('sensor.weather_station_frost_point_category') %}
        {% if c == 'Light Frost' %}cyan
        {% elif c == 'Hard Frost' %}blue
        {% else %}indigo
        {% endif %}
      fill_container: true
      tap_action:
        action: more-info
        entity: sensor.weather_station_frost_point_2
