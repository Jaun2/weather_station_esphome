# Weather Station — Summary Widget for Lovelace
#
# Drop-in dashboard card built on Mushroom Cards (HACS).
#
# Layout:
#   • Title bar
#   • System status row: charging, battery, wifi (chips)
#   • Big current temperature with feels-like
#   • Atmosphere chips: visibility, humidity, pressure
#   • Conditional "It's raining" card (only shown when actively raining)
#   • Rainfall summary (today + last 24h)
#   • Forecast hint chips: rain likelihood, fog probability
#   • Conditional heat warning card (only when heat index applies)
#   • Conditional frost warning card (only when frost point applies)
#
# How to use:
#   1. In Home Assistant, edit your dashboard.
#   2. Add Card → Manual.
#   3. Paste the entire YAML below (everything from `type: vertical-stack`
#      to the end of the file).
#   4. Save. The card will appear in your dashboard with all conditional
#      sections respecting their entity states.
#
# Requires:
#   - Home Assistant Companion ESPHome integration set up with the
#     weather-station device (entity IDs match the firmware naming).
#   - HACS + Mushroom Cards integration installed.
#
# Notes:
#   - The two warning cards (heat / frost) are *invisible* when their
#     respective category is "Not Applicable" (which is most of the time).
#     They auto-appear during heatwaves or sub-zero mornings.
#   - The "It's raining" card only shows while the Is Raining binary is
#     ON (default 5-minute window after the last tip).
#   - All chips and template cards are tappable for more-info popups.

type: vertical-stack
cards:
  # ─────────────────────────────────────────────────────────────────
  # Title
  # ─────────────────────────────────────────────────────────────────
  - type: custom:mushroom-title-card
    title: Weather Station
    subtitle: Vereeniging

  # ─────────────────────────────────────────────────────────────────
  # System status row — charging, battery, wifi
  # ─────────────────────────────────────────────────────────────────
  - type: custom:mushroom-chips-card
    alignment: end
    chips:
      # Charging indicator (icon + text changes based on state)
      - type: template
        icon: mdi:solar-power-variant
        icon_color: |-
          {% if is_state('binary_sensor.weather_station_charging', 'on') %}
          green
          {% else %}
          disabled
          {% endif %}
        content: |-
          {% if is_state('binary_sensor.weather_station_charging', 'on') %}
          Charging
          {% else %}
          Idle
          {% endif %}
        tap_action:
          action: more-info
          entity: binary_sensor.weather_station_charging

      # Battery (icon scales with charge level, color reflects health)
      - type: template
        icon: |-
          {% set p = states('sensor.weather_station_battery') | float(0) %}
          {% if p > 90 %}mdi:battery
          {% elif p > 70 %}mdi:battery-80
          {% elif p > 50 %}mdi:battery-60
          {% elif p > 30 %}mdi:battery-40
          {% elif p > 10 %}mdi:battery-20
          {% else %}mdi:battery-alert
          {% endif %}
        icon_color: |-
          {% set p = states('sensor.weather_station_battery') | float(0) %}
          {% if p > 50 %}green
          {% elif p > 20 %}orange
          {% else %}red
          {% endif %}
        content: "{{ states('sensor.weather_station_battery') }}%"
        tap_action:
          action: more-info
          entity: sensor.weather_station_battery

      # Wi-Fi strength (bars icon + percentage)
      - type: template
        icon: |-
          {% set s = states('sensor.weather_station_wifi_signal_strength') | float(0) %}
          {% if s > 70 %}mdi:wifi-strength-4
          {% elif s > 50 %}mdi:wifi-strength-3
          {% elif s > 30 %}mdi:wifi-strength-2
          {% elif s > 0 %}mdi:wifi-strength-1
          {% else %}mdi:wifi-strength-outline
          {% endif %}
        icon_color: |-
          {% set s = states('sensor.weather_station_wifi_signal_strength') | float(0) %}
          {% if s > 50 %}green
          {% elif s > 25 %}orange
          {% else %}red
          {% endif %}
        content: "{{ states('sensor.weather_station_wifi_signal_strength') | int(0) }}%"
        tap_action:
          action: more-info
          entity: sensor.weather_station_wifi_signal_strength

  # ─────────────────────────────────────────────────────────────────
  # Big current temperature with feels-like underneath
  # ─────────────────────────────────────────────────────────────────
  - type: custom:mushroom-template-card
    primary: "{{ states('sensor.weather_station_temperature') | round(1) }}°C"
    secondary: |-
      Feels like {{ states('sensor.weather_station_feels_like') | round(1) }}°C
    icon: mdi:thermometer
    icon_color: |-
      {% set t = states('sensor.weather_station_temperature') | float(0) %}
      {% if t >= 30 %}red
      {% elif t >= 20 %}orange
      {% elif t >= 10 %}amber
      {% elif t >= 0 %}blue
      {% else %}indigo
      {% endif %}
    fill_container: true
    tap_action:
      action: more-info
      entity: sensor.weather_station_temperature

  # ─────────────────────────────────────────────────────────────────
  # Atmosphere chips: visibility, humidity, pressure
  # ─────────────────────────────────────────────────────────────────
  - type: custom:mushroom-chips-card
    chips:
      - type: template
        entity: sensor.weather_station_visibility
        icon: |-
          {% set v = states('sensor.weather_station_visibility') %}
          {% if v == 'Fog' %}mdi:weather-fog
          {% elif v == 'Mist' %}mdi:weather-fog
          {% elif v == 'Haze' %}mdi:weather-hazy
          {% else %}mdi:weather-sunny
          {% endif %}
        icon_color: |-
          {% set v = states('sensor.weather_station_visibility') %}
          {% if v in ['Fog', 'Mist'] %}grey
          {% elif v == 'Haze' %}orange
          {% else %}amber
          {% endif %}
        content: "{{ states('sensor.weather_station_visibility') }}"
        tap_action:
          action: more-info
          entity: sensor.weather_station_visibility

      - type: template
        entity: sensor.weather_station_humidity
        icon: mdi:water-percent
        icon_color: blue
        content: "{{ states('sensor.weather_station_humidity') | round(0) }}%"
        tap_action:
          action: more-info
          entity: sensor.weather_station_humidity

      - type: template
        entity: sensor.weather_station_pressure
        icon: mdi:gauge
        icon_color: indigo
        content: "{{ states('sensor.weather_station_pressure') | round(0) }} hPa"
        tap_action:
          action: more-info
          entity: sensor.weather_station_pressure

  # ─────────────────────────────────────────────────────────────────
  # Conditional: actively raining right now
  # ─────────────────────────────────────────────────────────────────
  - type: conditional
    conditions:
      - condition: state
        entity: binary_sensor.weather_station_is_raining
        state: 'on'
    card:
      type: custom:mushroom-template-card
      primary: It's raining right now
      secondary: "{{ states('sensor.weather_station_rain_intensity') }}"
      icon: mdi:weather-pouring
      icon_color: blue
      fill_container: true
      tap_action:
        action: more-info
        entity: sensor.weather_station_rain_intensity

  # ─────────────────────────────────────────────────────────────────
  # Rainfall summary — today + last 24 hours
  # ─────────────────────────────────────────────────────────────────
  - type: custom:mushroom-template-card
    primary: Rainfall
    secondary: |-
      Today: {{ states('sensor.weather_station_rainfall_today') | round(2) }} mm  ·  24h: {{ states('sensor.weather_station_rainfall_24h') | round(2) }} mm
    icon: mdi:water
    icon_color: |-
      {% set today = states('sensor.weather_station_rainfall_today') | float(0) %}
      {% if today > 5 %}blue
      {% elif today > 0 %}cyan
      {% else %}disabled
      {% endif %}
    tap_action:
      action: more-info
      entity: sensor.weather_station_rainfall_today

  # ─────────────────────────────────────────────────────────────────
  # Forecast hint chips: rain likelihood + fog probability
  # ─────────────────────────────────────────────────────────────────
  - type: custom:mushroom-chips-card
    chips:
      - type: template
        entity: sensor.weather_station_rain_likelihood
        icon: mdi:cloud-percent-outline
        icon_color: |-
          {% set p = states('sensor.weather_station_rain_likelihood') | float(0) %}
          {% if p >= 70 %}blue
          {% elif p >= 40 %}cyan
          {% else %}grey
          {% endif %}
        content: "Rain {{ states('sensor.weather_station_rain_likelihood') | int(0) }}%"
        tap_action:
          action: more-info
          entity: sensor.weather_station_rain_likelihood

      - type: template
        entity: sensor.weather_station_fog_probability
        icon: mdi:weather-fog
        icon_color: |-
          {% set p = states('sensor.weather_station_fog_probability') | float(0) %}
          {% if p >= 70 %}grey
          {% elif p >= 40 %}blue-grey
          {% else %}disabled
          {% endif %}
        content: "Fog {{ states('sensor.weather_station_fog_probability') | int(0) }}%"
        tap_action:
          action: more-info
          entity: sensor.weather_station_fog_probability

  # ─────────────────────────────────────────────────────────────────
  # Conditional: heat warning
  # Only shows when Heat Index Category != "Not Applicable"
  # ─────────────────────────────────────────────────────────────────
  - type: conditional
    conditions:
      - condition: template
        value_template: >
          {{ states('sensor.weather_station_heat_index_category') not in
             ['Not Applicable', 'unknown', 'unavailable'] }}
    card:
      type: custom:mushroom-template-card
      primary: "Heat: {{ states('sensor.weather_station_heat_index_category') }}"
      secondary: |-
        Heat index {{ states('sensor.weather_station_heat_index') | round(1) }}°C
      icon: mdi:weather-sunny-alert
      icon_color: |-
        {% set c = states('sensor.weather_station_heat_index_category') %}
        {% if c == 'Caution' %}yellow
        {% elif c == 'Extreme Caution' %}orange
        {% elif c == 'Danger' %}red
        {% else %}deep-purple
        {% endif %}
      fill_container: true
      tap_action:
        action: more-info
        entity: sensor.weather_station_heat_index

  # ─────────────────────────────────────────────────────────────────
  # Conditional: frost warning
  # Only shows when Frost Point Category != "Not Applicable"
  # ─────────────────────────────────────────────────────────────────
  - type: conditional
    conditions:
      - condition: template
        value_template: >
          {{ states('sensor.weather_station_frost_point_category') not in
             ['Not Applicable', 'unknown', 'unavailable'] }}
    card:
      type: custom:mushroom-template-card
      primary: "Frost: {{ states('sensor.weather_station_frost_point_category') }}"
      secondary: |-
        Frost point {{ states('sensor.weather_station_frost_point') | round(1) }}°C
      icon: mdi:snowflake-alert
      icon_color: |-
        {% set c = states('sensor.weather_station_frost_point_category') %}
        {% if c == 'Light Frost' %}cyan
        {% elif c == 'Hard Frost' %}blue
        {% else %}indigo
        {% endif %}
      fill_container: true
      tap_action:
        action: more-info
        entity: sensor.weather_station_frost_point
