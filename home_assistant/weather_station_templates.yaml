# Weather Station — derived metric template sensors
#
# Computes dew point, heat index, frost point, fog probability, rain likelihood,
# visibility class, and feels-like temperature from the BME280's raw readings
# published by the ESPHome `weather-station` device.
#
# Source entities (from ESPHome native API auto-discovery):
#   sensor.weather_station_temperature   °C
#   sensor.weather_station_humidity      % RH
#   sensor.weather_station_pressure      hPa raw (~840 at 1500 m)
#
# This file has TWO sections that go in different parts of your HA config.
# Easiest one-time setup:
#   1. Drop this file into  /config/weather_station_templates.yaml
#   2. In configuration.yaml, add (or extend) these top-level entries — the
#      `!include` syntax doesn't span multiple top-level keys, so we paste
#      each section directly:
#
#        template: !include weather_station_templates_template.yaml
#        binary_sensor: !include weather_station_templates_binary.yaml
#
#      ...or simply paste Section 1 into your existing `template:` list and
#      Section 2 into your existing `binary_sensor:` list.
#
# Heuristic caveats (write these into the file so they don't get forgotten):
#   - Fog probability and rain likelihood are heuristics, not calibrated forecasts.
#   - Visibility class overlaps with fog probability by design — alternative views.
#   - Frost point only applies below 0 °C; reads `unknown` otherwise.
#   - Feels-like with wind = 0 is conservative below ~10 °C; Stage 9 adds wind.

# ============================================================================
# Section 1 — template: sensors
# ============================================================================

template:
  - sensor:

      - name: "Weather Station Dew Point"
        unique_id: weather_station_dew_point
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: |
          {% set t = states('sensor.weather_station_temperature') | float(none) %}
          {% set rh = states('sensor.weather_station_humidity') | float(none) %}
          {% if t is none or rh is none or rh <= 0 %}
            unknown
          {% else %}
            {% set a = 17.625 %}
            {% set b = 243.04 %}
            {% set alpha = (a * t) / (b + t) + log(rh / 100) %}
            {{ ((b * alpha) / (a - alpha)) | round(1) }}
          {% endif %}

      - name: "Weather Station Heat Index"
        unique_id: weather_station_heat_index
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: |
          {% set t = states('sensor.weather_station_temperature') | float(none) %}
          {% set rh = states('sensor.weather_station_humidity') | float(none) %}
          {% if t is none or rh is none %}
            unknown
          {% elif t < 27 or rh < 40 %}
            {{ t | round(1) }}
          {% else %}
            {% set tf = t * 9 / 5 + 32 %}
            {% set hi_f = -42.379
                          + 2.04901523 * tf
                          + 10.14333127 * rh
                          - 0.22475541 * tf * rh
                          - 0.00683783 * tf * tf
                          - 0.05481717 * rh * rh
                          + 0.00122874 * tf * tf * rh
                          + 0.00085282 * tf * rh * rh
                          - 0.00000199 * tf * tf * rh * rh %}
            {{ ((hi_f - 32) * 5 / 9) | round(1) }}
          {% endif %}

      - name: "Weather Station Frost Point"
        unique_id: weather_station_frost_point
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: |
          {% set t = states('sensor.weather_station_temperature') | float(none) %}
          {% set rh = states('sensor.weather_station_humidity') | float(none) %}
          {% if t is none or rh is none or rh <= 0 or t >= 0 %}
            unknown
          {% else %}
            {% set a = 22.587 %}
            {% set b = 273.86 %}
            {% set alpha = (a * t) / (b + t) + log(rh / 100) %}
            {{ ((b * alpha) / (a - alpha)) | round(1) }}
          {% endif %}

      - name: "Weather Station Fog Probability"
        unique_id: weather_station_fog_probability
        unit_of_measurement: "%"
        state_class: measurement
        state: |
          {% set t = states('sensor.weather_station_temperature') | float(none) %}
          {% set rh = states('sensor.weather_station_humidity') | float(none) %}
          {% set td = states('sensor.weather_station_dew_point') | float(none) %}
          {% if t is none or rh is none or td is none %}
            unknown
          {% else %}
            {% set spread = [0, t - td] | max %}
            {% set rh_frac = rh / 100 %}
            {% set score = (rh_frac * rh_frac) * ([0, 100 - 25 * spread] | max) %}
            {{ [0, [100, score] | min] | max | round(0) }}
          {% endif %}

      - name: "Weather Station Rain Likelihood"
        unique_id: weather_station_rain_likelihood
        unit_of_measurement: "%"
        state_class: measurement
        state: |
          {% set t = states('sensor.weather_station_temperature') | float(none) %}
          {% set td = states('sensor.weather_station_dew_point') | float(none) %}
          {% set p_falling = is_state('binary_sensor.weather_station_pressure_falling', 'on') %}
          {% set h_rising = is_state('binary_sensor.weather_station_humidity_rising', 'on') %}
          {% if t is none or td is none %}
            unknown
          {% else %}
            {% set spread = [0, t - td] | max %}
            {% set spread_score = [0, [33, 33 * (1 - spread / 5)] | min] | max %}
            {% set p_score = 33 if p_falling else 0 %}
            {% set h_score = 34 if h_rising else 0 %}
            {{ (p_score + h_score + spread_score) | round(0) }}
          {% endif %}

      - name: "Weather Station Visibility"
        unique_id: weather_station_visibility
        state: |
          {% set rh = states('sensor.weather_station_humidity') | float(none) %}
          {% set t = states('sensor.weather_station_temperature') | float(none) %}
          {% set td = states('sensor.weather_station_dew_point') | float(none) %}
          {% if rh is none or t is none or td is none %}
            unknown
          {% else %}
            {% set spread = [0, t - td] | max %}
            {% if rh > 95 and spread < 1 %}
              Fog
            {% elif rh > 90 %}
              Mist
            {% elif rh > 80 %}
              Haze
            {% else %}
              Clear
            {% endif %}
          {% endif %}

      - name: "Weather Station Feels Like"
        unique_id: weather_station_feels_like
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: |
          {% set t = states('sensor.weather_station_temperature') | float(none) %}
          {% set rh = states('sensor.weather_station_humidity') | float(none) %}
          {% if t is none or rh is none %}
            unknown
          {% else %}
            {% set es = 6.105 * exp(17.27 * t / (237.7 + t)) %}
            {% set e = (rh / 100) * es %}
            {{ (t + 0.33 * e - 4.00) | round(1) }}
          {% endif %}


# ============================================================================
# Section 2 — binary_sensor: trend (inputs for rain likelihood)
# ============================================================================
#
# Uses HA's built-in `trend` integration to detect pressure-falling and
# humidity-rising over a multi-hour window. Output is `on`/`off` consumed
# by the Rain Likelihood template above.

binary_sensor:
  - platform: trend
    sensors:
      weather_station_pressure_falling:
        friendly_name: "Weather Station Pressure Falling"
        entity_id: sensor.weather_station_pressure
        sample_duration: 10800   # 3 hours of samples
        max_samples: 12
        invert: true             # 'on' when gradient is negative
        min_gradient: 0.00004    # ~0.5 hPa/3h threshold, in units/sec

      weather_station_humidity_rising:
        friendly_name: "Weather Station Humidity Rising"
        entity_id: sensor.weather_station_humidity
        sample_duration: 7200    # 2 hours of samples
        max_samples: 8
        min_gradient: 0.0001     # ~0.7 %/2h threshold, in units/sec
