# Copy this file to `secrets.yaml` and fill in real values.
# `secrets.yaml` is gitignored; this template is checked in to document required keys.

wifi_ssid: "REPLACE_ME"
wifi_password: "REPLACE_ME"

# Fallback hotspot the device exposes if it can't join the configured Wi-Fi.
# Connect to it with a phone to enter new Wi-Fi credentials via captive portal.
ap_password: "REPLACE_ME"

# OTA install password. Long random string. Generate once, keep stable.
# Re-flashing without this requires USB.
ota_password: "REPLACE_ME"

# Native API encryption key. Base64-encoded 32 bytes.
# Generate via `openssl rand -base64 32` or the ESPHome dashboard "Generate" button.
api_encryption_key: "REPLACE_ME"
